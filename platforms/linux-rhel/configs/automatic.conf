# TWDxOSOptimisation — dnf-automatic policy (RHEL/Fedora/CentOS family)
# https://github.com/TheWebDexterTech/TWDxOSOptimisation
#
# Installed to /etc/dnf/automatic.conf. Equivalent role to Debian's
# unattended-upgrades: applies updates unattended on a schedule driven by
# the dnf-automatic-install.timer systemd unit (enabled by install.sh).

[commands]
# default = all available updates; change to "security" to apply only
# security advisories (requires dnf-plugins-core's security metadata).
upgrade_type = default
random_sleep = 0
download_updates = yes
apply_updates = yes

[emitters]
# Log to the system log instead of trying to send mail (no MTA assumed).
emit_via = stdio
system_name = TWDxOSOptimisation

[base]
debuglevel = 1
