# needrestart configuration (RHEL/Fedora/CentOS family, via EPEL)
# https://github.com/liske/needrestart

# Auto-restart services after library updates without prompting.
# 'a' = automatic (no prompts). This will silently restart MySQL/MariaDB,
# nginx, PHP-FPM, httpd, etc. after every dnf run. Set to 'i' for
# interactive if you need to approve each restart.
$nrconf{restart} = 'a';

# Print kernel hints to stderr only — no interactive prompts.
$nrconf{kernelhints} = -1;

# Binaries to ignore (not daemons).
$nrconf{blacklist} = [
    qr(^/usr/bin/sudo$),
    qr(^/usr/sbin/dhclient$),
    qr(^/usr/bin/dnf$),
    qr(^/usr/bin/yum$),
];

# Services to never restart automatically.
$nrconf{override_rc} = {
    # DBus
    qr(^dbus) => 0,

    # Display managers
    qr(^gdm) => 0, qr(^kdm) => 0, qr(^sddm) => 0, qr(^lightdm) => 0,

    # Networking
    qr(^NetworkManager) => 0,
    qr(^firewalld) => 0,
    qr(^wpa_supplicant) => 0,
    qr(^openvpn) => 0,

    # Terminals / sessions
    qr(^getty@.+\.service) => 0,
    qr(^serial-getty@.+\.service) => 0,
    qr(^user@\d+\.service) => 0,

    # Virtualisation / containers
    qr(^libvirtd) => 0,
    qr(^docker) => 0,
    qr(^podman) => 0,

    # System oneshots
    qr(^emergency\.service$) => 0,
    qr(^rescue\.service$) => 0,
    qr(^dnf-automatic.*\.service$) => 0,
    qr(^dnf-automatic.*\.timer$) => 0,
    qr(^crond\.service$) => 0,
    qr(^auditd\.service$) => 0,
    qr(^systemd-logind) => 0,
};

$nrconf{override_cont} = {};

$nrconf{blacklist_interp} = [
    qr(^/tmp/), qr(^/var/), qr(^/run/),
];

$nrconf{blacklist_mappings} = [
    qr(^/(SYSV00000000( \(deleted\))?|drm(\s|$)|dev/)),
    qr(^/memfd:),
    qr(^/\[aio\]),
    qr#/orcexec\.[\w\d]+( \(deleted\))?$#,
    qr(/#\d+( \(deleted\))?$),
    qr#/jna\d+\.tmp( \(deleted\))?$#,
    qr#^(/var)?/tmp/#,
    qr#^(/var)?/run/#,
];

$nrconf{skip_mapfiles} = -1;

if(-d q(/etc/needrestart/conf.d)) {
    foreach my $fn (sort </etc/needrestart/conf.d/*.conf>) {
        eval do { local(@ARGV, $/) = $fn; <>};
        die "Error parsing $fn: $@" if($@);
    }
}
